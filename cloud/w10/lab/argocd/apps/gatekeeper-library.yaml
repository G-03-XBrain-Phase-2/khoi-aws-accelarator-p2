apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: gatekeeper-library
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
spec:
  project: default
  source:
    repoURL: https://github.com/Temp-gitgud/temp.git
    targetRevision: main
    path: gatekeeper/library
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true